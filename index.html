<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d1f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bulgarski">
<link rel="apple-touch-icon" href="./icon-512.png">
<link rel="icon" type="image/png" href="./icon-512.png">
<link id="manifest" rel="manifest">
<title>Bulgarski – A1 → A2</title>
<style>
  html,body{margin:0;background:#0d1f14;color:#e8f5ee;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;}
  .boot{min-height:100vh;display:flex;align-items:center;justify-content:center;color:#5a9070;font-size:15px;text-align:center;padding:24px;}
</style>
</head>
<body>
<div id="app"><div class="boot">Lädt…</div></div>
<script>
// Service Worker registrieren (Offline-Unterstützung)
if("serviceWorker" in navigator){ try{ navigator.serviceWorker.register("sw.js"); }catch(e){} }
// Manifest (Android-Installation)
(function(){
  var m={name:"Bulgarski – A1 → A2",short_name:"Bulgarski",start_url:".",scope:".",display:"standalone",orientation:"portrait",background_color:"#0d1f14",theme_color:"#0d1f14",icons:[{src:"./icon-512.png",sizes:"512x512",type:"image/png",purpose:"any maskable"}]};
  try{ document.getElementById("manifest").href=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:"application/manifest+json"})); }catch(e){}
})();
// Auto-Update: lädt den App-Inhalt bei JEDEM Start frisch (umgeht den Cache).
(function(){
  var s=document.createElement("script");
  s.src="app.js?t="+Date.now();
  s.onerror=function(){ var a=document.getElementById("app"); if(a) a.innerHTML='<div class="boot">Keine Verbindung — bitte einmal online öffnen, damit die App geladen werden kann.</div>'; };
  document.body.appendChild(s);
})();
</script>
</body>
</html>
