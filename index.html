// ───────── Storage ─────────
function load(k,d){ try{ var v=JSON.parse(localStorage.getItem(k)); return v==null?d:v; }catch(e){ return d; } }
function save(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
function todayKey(){ return new Date().toISOString().split("T")[0]; }

// ───────── Spaced repetition (SM-2) ─────────
function sm2(c,quality){
  var q=quality===0?1:quality===1?3:5;
  var ease=c.ease||2.5, interval=c.interval||1, reps=c.reps||0;
  if(q>=3){ interval=reps===0?1:reps===1?6:Math.round(interval*ease); reps+=1; }
  else { interval=1; reps=0; }
  ease=Math.max(1.3, ease+0.1-(5-q)*(0.08+(5-q)*0.02));
  return {ease:ease,interval:interval,reps:reps,nextDue:Date.now()+interval*86400000};
}

// ───────── Audio ─────────
function speak(t){
  try{
    if(!("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(t.replace(/…/g,""));
    u.lang="bg-BG"; u.rate=0.85;
    var vs=window.speechSynthesis.getVoices()||[];
    var bg=vs.filter(function(v){return v.lang&&v.lang.toLowerCase().indexOf("bg")===0;})[0];
    if(bg) u.voice=bg;
    window.speechSynthesis.speak(u);
  }catch(e){}
}
if("speechSynthesis" in window){ window.speechSynthesis.getVoices(); window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();}; }

// ───────── Typing match helpers ─────────
function norm(s){ return String(s).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/ă|ǎ|â/g,"a").replace(/[^a-z]/g,""); }
function key(s){
  s=norm(s);
  s=s.replace(/scht/g,"1").replace(/tsch/g,"2").replace(/sch/g,"3").replace(/ch/g,"4");
  s=s.replace(/ss/g,"s").replace(/w/g,"v").replace(/ts/g,"z").replace(/y/g,"j");
  return s;
}
// Kyrillisch: nur kyrillische Buchstaben, klein, ohne Leer-/Satzzeichen
function normCyr(s){ return String(s).toLowerCase().replace(/[^\u0400-\u04FF]/g,""); }
function hasCyr(s){ return /[\u0400-\u04FF]/.test(s); }
function lev(a,b){
  var m=a.length,n=b.length,d=[];
  for(var i=0;i<=m;i++){ d[i]=[i]; }
  for(var j=0;j<=n;j++){ d[0][j]=j; }
  for(i=1;i<=m;i++) for(j=1;j<=n;j++)
    d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return d[m][n];
}

// ───────── State ─────────
var progress=load("bg_progress",{});
// Einmalige Migration: alte zahlenbasierte IDs (1,2,3…) -> wortbasierte IDs.
// Die Reihenfolge der bestehenden Eintraege bleibt unveraendert, daher stimmt die Zuordnung.
(function(){
  var ks=Object.keys(progress);
  if(ks.length && ks.every(function(k){return /^[0-9]+$/.test(k);})){
    var mig={};
    ks.forEach(function(k){ var i=parseInt(k,10)-1; if(VOCAB[i]) mig[VOCAB[i].bg]=progress[k]; });
    progress=mig; save("bg_progress",progress);
  }
})();

var mode=load("bg_mode","cards");     // 'cards' | 'type'
var scope=load("bg_scope","smart");   // 'smart' | 'A1' | 'A2' | 'review'
var dir=load("bg_dir","bg2de");       // 'bg2de' (BG->DE erkennen) | 'de2bg' (DE->BG abrufen) — nur Karten-Modus
var session=[], cur=0, flipped=false, phase="home", typeState=null;

function mastered(v){ var p=progress[v.id]; return p&&p.reps>=2; }
function isWord(v){ return v.lvl!=="ABC"; }                 // Wörter (A1/A2), ohne Alphabet
function lvlStats(l){ var t=VOCAB.filter(function(v){return v.lvl===l;}); return {total:t.length, done:t.filter(mastered).length}; }
function abcStats(){ var t=VOCAB.filter(function(v){return v.lvl==="ABC";}); return {total:t.length, done:t.filter(mastered).length}; }
function masteredTotal(){ return VOCAB.filter(function(v){return isWord(v)&&mastered(v);}).length; }
function wordTotal(){ return VOCAB.filter(isWord).length; }
function isDue(v){ var p=progress[v.id]; return p&&p.nextDue<=Date.now(); }
function seen(v){ return !!progress[v.id]; }
function dueCount(){ return VOCAB.filter(function(v){return isWord(v)&&isDue(v);}).length; }
function todayDone(){ return todayC.day===todayKey()?todayC.count:0; }

function buildSession(){
  var pool=[];
  if(scope==="abc"){
    var ad=VOCAB.filter(function(v){return v.lvl==="ABC"&&isDue(v);});
    var af=VOCAB.filter(function(v){return v.lvl==="ABC"&&!seen(v);});
    pool=ad.concat(af); if(!pool.length) pool=VOCAB.filter(function(v){return v.lvl==="ABC";});
  } else if(scope==="review"){
    pool=VOCAB.filter(function(v){return isWord(v)&&isDue(v);}); if(!pool.length) pool=VOCAB.filter(function(v){return isWord(v)&&seen(v);});
  } else if(scope==="A1"||scope==="A2"){
    var due=VOCAB.filter(function(v){return v.lvl===scope&&isDue(v);});
    var fresh=VOCAB.filter(function(v){return v.lvl===scope&&!seen(v);});
    pool=due.concat(fresh); if(!pool.length) pool=VOCAB.filter(function(v){return v.lvl===scope;});
  } else {
    var d=VOCAB.filter(function(v){return isWord(v)&&isDue(v);});
    var fa1=VOCAB.filter(function(v){return v.lvl==="A1"&&!seen(v);});
    var fa2=VOCAB.filter(function(v){return v.lvl==="A2"&&!seen(v);});
    var a1=lvlStats("A1");
    var intro=(a1.total&&a1.done/a1.total<0.8)?fa1.concat(fa2):fa2.concat(fa1);
    pool=d.concat(intro);
  }
  var ids={}, out=[];
  pool.forEach(function(v){ if(!ids[v.id]){ids[v.id]=1;out.push(v);} });
  if(!out.length) out=VOCAB.filter(isWord);
  return out.slice(0,SESSION_TARGET).sort(function(){return Math.random()-0.5;});
}

function startSession(){ session=buildSession(); cur=0; flipped=false; typeState=null; phase="session"; render(); }

function answer(q){
  var c=session[cur];
  progress[c.id]=sm2(progress[c.id]||{},q); save("bg_progress",progress);
  var t=todayKey();
  todayC={day:t,count:(todayC.day===t?todayC.count:0)+1}; save("bg_today",todayC);
  var yest=new Date(Date.now()-86400000).toISOString().split("T")[0];
  if(streak.lastDay!==t){ streak=streak.lastDay===yest?{count:streak.count+1,lastDay:t}:{count:1,lastDay:t}; save("bg_streak",streak); }
  typeState=null;
  if(cur+1>=session.length){ phase="done"; render(); } else { cur++; flipped=false; render(); }
}

function checkTyping(){
  var c=session[cur], val=(document.getElementById("inp")||{}).value||"";
  var ok, close;
  if(hasCyr(val)){                                   // kyrillische Eingabe -> mit dem echten Wort/Buchstaben vergleichen
    var a=normCyr(val), b=normCyr(c.match||c.bg);
    ok = a.length>0 && a===b;
    close = !ok && a.length>0 && lev(a,b)<=1;
  } else {                                           // lateinische Eingabe -> mit der Umschrift vergleichen
    ok = key(val)===key(c.rom);
    close = !ok && norm(val).length>0 && lev(norm(val),norm(c.rom))<=1;
  }
  typeState={ok:ok,close:close,val:val}; speak(c.match||c.bg); render();
}

   '<div class="panel"><div class="h">Warum das funktioniert</div>'+
     '<div class="megasub" style="color:#a8e6c0;font-size:14px;line-height:1.55">Spaced Repetition nutzt den <i>Spacing Effect</i> (Ebbinghaus, 1885): gewusste Karten kommen seltener, schwierige öfter. Der Tipp-Modus erzwingt aktives Abrufen — die wirksamste Form des Übens.</div></div>'+
   '<button class="cta" id="h">Zur Übersicht</button>'+
   '<button class="ghost" id="a">Noch eine Runde</button>';
  document.getElementById("h").onclick=function(){ phase="home"; render(); };
  document.getElementById("a").onclick=startSession;
}

function ses(){
  var c=session[cur], pct=(cur/session.length)*100;
  var head='<div class="top"><span class="brand">🇧🇬 Bulgarski</span><span class="count">'+(cur+1)+' / '+session.length+'</span></div>'+
           '<div class="bar"><div class="fill" style="width:'+pct+'%"></div></div>'+
           '<div class="badge">'+esc(c.cat)+' · '+c.lvl+'</div>';

  if(mode==="type"){
    if(!typeState){
      app.innerHTML=head+
        '<div class="prompt">'+esc(c.de)+'</div><div class="promptsub">Tippe das bulgarische Wort — kyrillisch (Здравейте) oder lateinisch</div>'+
        '<input class="inp" id="inp" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="hier tippen…">'+
        '<button class="check" id="ck">Prüfen</button>'+
        '<button class="cancel" id="cancel">Abbrechen</button>';
      var inp=document.getElementById("inp"); inp.focus();
      inp.addEventListener("keydown",function(e){ if(e.key==="Enter") checkTyping(); });
      document.getElementById("ck").onclick=checkTyping;
      document.getElementById("cancel").onclick=function(){ phase="home"; render(); };
    } else {
      var vClass=typeState.ok?"v-ok":typeState.close?"v-close":"v-no";
      var vText=typeState.ok?"✓ Richtig!":typeState.close?"~ Fast richtig":"✗ Nicht ganz";
      app.innerHTML=head+
        '<div class="verdict '+vClass+'">'+vText+'</div>'+
        (typeState.val?'<div class="yours">deine Eingabe: '+esc(typeState.val)+'</div>':'')+
        '<div class="card"><div class="word">'+esc(c.bg)+'</div><div class="rom">'+esc(c.rom)+'</div>'+
          '<button class="spk" id="spk">🔊</button><div class="divln"></div><div class="trans">'+esc(c.de)+'</div></div>'+
        '<div class="ans">'+
          '<button class="a-wrong '+(!typeState.ok&&!typeState.close?"sugg":"")+'" id="w">✗ Falsch</button>'+
          '<button class="a-hard '+(typeState.close?"sugg":"")+'" id="h">~ Schwer</button>'+
          '<button class="a-good '+(typeState.ok?"sugg":"")+'" id="g">✓ Gewusst</button>'+
        '</div>';
      document.getElementById("spk").onclick=function(){ speak(c.match||c.bg); };
      document.getElementById("w").onclick=function(){ answer(0); };
      document.getElementById("h").onclick=function(){ answer(1); };
      document.getElementById("g").onclick=function(){ answer(2); };
    }
    return;
  }

  // card mode
  var back='<div class="word">'+esc(c.bg)+'</div><div class="rom">'+esc(c.rom)+'</div><button class="spk" id="spk">🔊</button>'+(c.note?'<div class="note">'+esc(c.note)+'</div>':'')+'<div class="divln"></div><div class="trans">'+esc(c.de)+'</div>';
  var front=(dir==="de2bg")
    ? '<div class="word">'+esc(c.de)+'</div><div class="hint">Tippe zum Aufdecken</div>'
    : '<div class="word">'+esc(c.bg)+'</div><div class="rom">'+esc(c.rom)+'</div><button class="spk" id="spk">🔊</button><div class="hint">Tippe zum Aufdecken</div>';
  var face = flipped ? back : front;
  app.innerHTML=head+'<div class="card" id="card" style="margin-top:14px">'+face+'</div>'+
    (flipped
      ? '<div class="ans"><button class="a-wrong" id="w" style="opacity:1">✗ Falsch</button><button class="a-hard" id="h" style="opacity:1">~ Schwer</button><button class="a-good" id="g" style="opacity:1">✓ Gewusst</button></div>'
      : '<button class="cancel" id="cancel">Abbrechen</button>');
  var spkEl=document.getElementById("spk"); if(spkEl) spkEl.onclick=function(ev){ ev.stopPropagation(); speak(c.match||c.bg); };
  if(!flipped){
    document.getElementById("card").onclick=function(){ flipped=true; speak(c.match||c.bg); render(); };
    document.getElementById("cancel").onclick=function(){ phase="home"; render(); };
  } else {
    document.getElementById("w").onclick=function(){ answer(0); };
    document.getElementById("h").onclick=function(){ answer(1); };
    document.getElementById("g").onclick=function(){ answer(2); };
  }
}

render();
</script>
</body>
</html>
